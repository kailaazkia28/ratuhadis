<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover - Full Background Lotso</title>
    <style>
        body { 
            padding: 20px; 
            max-width: 900px; 
            margin: 0 auto; 
            /* Gambar Lotso menjadi background full satu layar tanpa transparansi */
            background-image: url('lotso-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        
        /* Kotak teks di tengah dibuat putih solid agar tulisan tidak tabrakan dengan background */
        .cover-box {
            background-color: #ffffff; /* Putih bersih solid, tidak transparan */
            color: #4a1525;
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 650px; /* Ukuran kotak disesuaikan agar gambar Lotso di kanan-kiri lebih terlihat */
            border: 4px solid #ffb3c6; /* Bingkai pink lucu */
            position: relative;
        }

        /* Badge Digital / Nuansa Teknologi di bagian atas */
        .tech-badge {
            display: inline-block;
            background-color: #901a38;
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(144, 26, 56, 0.2);
        }

        /* Judul E-book */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #901a38;
        }
        
        /* Sub-Judul */
        h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 35px;
            color: #b02a4e;
            border-bottom: 2px dashed #ffb3c6;
            padding-bottom: 20px;
        }

        /* Kotak Informasi Identitas */
        .meta-container {
            background-color: #fff4f7; /* Background pink super muda solid */
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #ffb3c6;
            margin: 0 auto;
        }

        .meta-info {
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 6px;
            color: #4a1525;
        }
        
        .meta-info strong {
            color: #901a38;
            font-weight: 700;
        }

        .instansi {
            margin-top: 35px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #b02a4e;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="cover-box">

        <div class="tech-badge">Interactive E-Book // Digital Edition</div>

        <h1>Penerapan Studi Hadis Tematik</h1>
        <h2>Di Bidang Sosial dan Kemasyarakatan</h2>
        
        <div class="meta-container">
            <div class="meta-info">Penulis: <strong>Muhammad Fahrul Ihsan</strong> (241320065)</div>
            <div class="meta-info">Editor: <strong>Ratu Kaila Azkia</strong></div>
        </div>
        
        <div class="instansi">
            Program Studi Ilmu Al-Qur'an dan Tafsir<br>
            Universitas Islam Negeri Sultan Maulana Hasanuddin Banten
        </div>
    </div>

</body>
</html>
